services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: llm_benchmarker
    command: postgres -c shared_buffers=128MB -c work_mem=4MB -c max_connections=50
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  minio:
    image: minio/minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  api:
    build:
      context: ./API
      dockerfile: Dockerfile
    container_name: llm_api
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./API:/app
      - /app/.venv
    ports:
      - "8000:8000"
    env_file:
      - ./API/.env
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M


  worker:
    build:
      context: ./API
      dockerfile: Dockerfile
    container_name: llm_worker
    command: uv run python -m app.worker_main
    volumes:
      - ./API:/app
      - /app/.venv
    env_file:
      - ./API/.env
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

volumes:
  postgres_data:
  minio_data: